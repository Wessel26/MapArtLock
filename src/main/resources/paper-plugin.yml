name: MapArtLock
version: '${version}'

main: nl.chimpgamer.mapartlock.MapArtLockPlugin
api-version: '1.21'
load: POSTWORLD

authors: [ ChimpGamer, HetGoed ]
description: Beschermt map art tegen duplicatie, diefstal en vernieling.

# LET OP - geef nooit een node hieronder een asterisk.
# Alles ligt onder mapartlock., dus "mapartlock.*" zou over admin, bypass en reload
# heen spannen: elke speler die hem krijgt wordt beheerder. Wil je als serverbeheerder
# alles in een keer geven, gebruik dan mapartlock.* in je permissieplugin - de plugin
# zelf controleert die node nergens op. De hierarchie loopt via mapartlock.admin.
permissions:
  mapartlock.use:
    description: "Menu openen en eigen map art locken/unlocken."
    default: false
  mapartlock.bypass:
    description: "Door de bescherming heen werken."
    default: false
  mapartlock.reload:
    description: "/mapartlock reload gebruiken."
    default: false
  mapartlock.admin:
    description: "Volledige beheerdersrechten, inclusief andermans map art unlocken."
    default: op
    children:
      mapartlock.use: true
      mapartlock.bypass: true
      mapartlock.reload: true
