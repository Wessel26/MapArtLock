name: MapArtLock
version: '${version}'

main: nl.chimpgamer.mapartlock.MapArtLockPlugin
api-version: '1.21'
load: POSTWORLD

authors: [ ChimpGamer, HetGoed ]
description: Protects map art against duplication, theft and destruction.

# NOTE - never give a node below an asterisk.
# Everything lives under mapartlock., so "mapartlock.*" would span admin, bypass and
# reload as well: any player granted it becomes an administrator. To hand out everything
# at once as a server owner, use mapartlock.* in your permission plugin — the plugin
# itself never checks that node. The hierarchy runs through mapartlock.admin.
permissions:
  mapartlock.use:
    description: "Open the menu and protect or release your own map art."
    default: false
  mapartlock.bypass:
    description: "Work through the protection."
    default: false
  mapartlock.reload:
    description: "Use /mapartlock reload."
    default: false
  mapartlock.admin:
    description: "Full administrative rights, including releasing other players' map art."
    default: op
    children:
      mapartlock.use: true
      mapartlock.bypass: true
      mapartlock.reload: true
