already_locked: "<#ff8c00>MapArt</#ff8c00> <yellow>is al gelockt.</yellow>"
already_unlocked: "<#ff8c00>MapArt</#ff8c00> <yellow>is al ontgrendeld.</yellow>"
not_owner: "<#ff8c00>MapArt</#ff8c00> <red>behoort niet aan jou.</red>"
must_hold_map: "<yellow>Je moet een</yellow> <#ff8c00>ingevulde kaart</#ff8c00> <yellow>vasthouden.</yellow>"
map_has_no_data: "<red>Deze kaart heeft nog geen map-data en kan niet gelockt worden.</red>"
no_permission: "<red>Je hebt hier geen rechten voor.</red>"
players_only: "<red>Dit commando kan alleen door een speler gebruikt worden.</red>"
protected_inventory_blocked: "<#ff8c00>MapArt</#ff8c00> <red>kan hier niet worden geplaatst.</red>"
item_frame_protected: "<#ff8c00>MapArt</#ff8c00> <red>in dit item frame is beschermd.</red>"
usage: "<yellow>Gebruik:</yellow> <#ff8c00>/mapartlock</#ff8c00>"
usage_admin: "<yellow>Gebruik:</yellow> <#ff8c00>/mapartlock</#ff8c00><yellow>,</yellow> <#ff8c00>/mapartlock reload</#ff8c00>"
