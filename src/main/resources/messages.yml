# Lore op een gelockte kaart.
lore:
  header: "<gold>MapArt Protection</gold>"
  status: "<gray>Status: <green>Gelockt</green></gray>"
  owner: "<gray>Eigenaar: <white><owner></white></gray>"

menu:
  title: "<dark_gray>Map Lock</dark_gray>"
  lock:
    name: "<green>Lock</green>"
    lore: "<gray>Bescherm deze map art.</gray>"
    lore_disabled: "<dark_gray>Deze map art is al gelockt.</dark_gray>"
  unlock:
    name: "<red>Unlock</red>"
    lore: "<gray>Verwijder de bescherming.</gray>"
    lore_disabled: "<dark_gray>Deze map art is niet gelockt.</dark_gray>"
  info:
    map_id: "<gray>Map ID: <white><map_id></white></gray>"
    status_locked: "<gray>Status: <green>Gelockt</green></gray>"
    status_unlocked: "<gray>Status: <yellow>Niet gelockt</yellow></gray>"
    owner: "<gray>Eigenaar: <white><owner></white></gray>"
    locked_at: "<gray>Gelockt op: <white><locked_at></white></gray>"
