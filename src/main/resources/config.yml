# MapArtLock
#
# De bescherming staat in de persistent data container van de kaart zelf. Er is dus
# geen opslagbestand, niets in het geheugen en niets om te synchroniseren: de
# bescherming reist mee in kisten, shulkers en backups.
#
# Let op: bescherming volgt het item, niet het kunstwerk. Wie /give kan draaien maakt
# een onbeschermde kopie - maar met die rechten kan hij deze plugin ook uitzetten.

menu:
  # Sneak + rechtermuisknop op een ingevulde kaart opent het menu.
  # Bewust sneak: een gewone rechtermuisknop plaatst de kaart in een item frame.
  open-on-sneak-right-click: true

appearance:
  glint: true
  show-owner-in-lore: true

protection:
  anvil: true
  crafting-table: true
  cartography-table: true
  crafter: true
  # Voorkomt dat een gelockte kaart uit een frame gehaald, gedraaid of weggeblazen
  # wordt. Een kaart in een leeg frame plaatsen blijft gewoon werken.
  item-frames: true
  hoppers: true

admin:
  # Of mapartlock.bypass iets doet. Op false is de bescherming absoluut, ook voor jou.
  bypass-enabled: true
  # Logt lock- en unlock-acties naar de console.
  log-actions: true
